<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cow Measurement Display Wall</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #000;
            min-height: 100vh;
            color: #fff;
        }

        .page {
            padding: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0;
            width: 100vw;
            height: 100vh;
        }

        .card {
            background: #000;
            overflow: hidden;
            min-height: 50vh;
            position: relative;
        }

        .image-wrap {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 50vh;
            background: #000;
        }

        .image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .annotation {
            position: absolute;
            font-size: 16px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.65);
            color: #fff;
            border-radius: 6px;
            padding: 8px 12px;
        }

        .annotation.left {
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
        }

        .annotation.right {
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
        }

        .annotation.index {
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            padding: 6px 10px;
        }

        .empty {
            width: 100%;
            height: 100%;
            min-height: 50vh;
            background: #000;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div id="grid" class="grid"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://iukxcgvmzjfelwfrpkyi.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1a3hjZ3ZtempmZWx3ZnJwa3lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDI0ODIyNTUsImV4cCI6MjA1ODA1ODI1NX0.GeapZttOxLzI_rnUUo6wlApy8wfHdkYzFNrSnP5NIYw';

        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const gridEl = document.getElementById('grid');
        const BATCH_SIZE = 4;
        const ROTATE_MS = 5000;

        let currentStartIndex = 0;
        let isRefreshing = false;

        function renderSlot(slot) {
            if (!slot || !slot.entry) {
                return `
                    <div class="card">
                        <div class="empty"></div>
                    </div>
                `;
            }

            const { entry, displayIndex } = slot;

            return `
                <div class="card">
                    <div class="image-wrap">
                        <img class="image" src="${entry.image_url}" alt="Measurement image" />
                        <div class="annotation index">#${displayIndex}</div>
                        <div class="annotation left">${entry.blue_weight} kg</div>
                        <div class="annotation right">${entry.red_weight} kg</div>
                    </div>
                </div>
            `;
        }

        function getBatch(entries, startIndex) {
            const batch = [];
            for (let offset = 0; offset < BATCH_SIZE; offset += 1) {
                const index = startIndex + offset;
                if (index < entries.length) {
                    batch.push({
                        entry: entries[index],
                        displayIndex: index + 1
                    });
                }
            }

            while (batch.length < BATCH_SIZE) {
                batch.push(null);
            }
            return batch;
        }

        function getNextStartIndex(entriesLength, startIndex) {
            if (entriesLength === 0) {
                return 0;
            }

            const nextIndex = startIndex + BATCH_SIZE;
            if (nextIndex >= entriesLength) {
                return 0;
            }

            return nextIndex;
        }

        async function fetchAllMeasurements() {
            const { data, error } = await supabaseClient
                .from('measurements')
                .select('id, created_at, image_url, blue_weight, red_weight')
                .limit(100);

            if (error) {
                throw error;
            }

            return (data || []).sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
        }

        async function refreshDisplay() {
            if (isRefreshing) {
                return;
            }

            isRefreshing = true;

            try {
                const entries = await fetchAllMeasurements();
                const batch = getBatch(entries, currentStartIndex);

                gridEl.innerHTML = batch.map(renderSlot).join('');

                currentStartIndex = getNextStartIndex(entries.length, currentStartIndex);
            } catch (error) {
                console.error('Failed to refresh display:', error);
            } finally {
                isRefreshing = false;
            }
        }

        refreshDisplay();
        setInterval(refreshDisplay, ROTATE_MS);
    </script>
</body>
</html>
